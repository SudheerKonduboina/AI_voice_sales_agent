services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama-model-puller:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: [ "sh", "-c", "curl -f -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:3b\"}'" ]

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
    volumes:
      - crm_data:/app/crm
      - logs_data:/app/logs
      - ./config:/app/config
      - ./models:/app/models
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  ollama_data:
  crm_data:
  logs_data:
