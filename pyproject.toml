[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# E/W = pycodestyle errors/warnings, F = pyflakes, I = isort,
# UP = pyupgrade, B = bugbear, C4 = flake8-comprehensions
select = ["E", "W", "F", "I", "UP", "B", "C4"]
ignore = [
    "E501",   # line too long — handled by formatter, not linter
    "B008",   # do not perform function calls in argument defaults (FastAPI uses this)
    "B904",   # within except clause, raise from — not always appropriate
    "UP007",  # Use X | Y for union type annotations — requires Python 3.10+
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501", "F841"]  # Allow long lines and unused vars in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
warn_return_any = false   # too noisy at baseline
disallow_untyped_calls = false  # tighten per-module later
# Per-module overrides can be added here as type coverage improves

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["agent", "crm"]
addopts = "-v --tb=short"
